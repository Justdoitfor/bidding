services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MYSQL_HOST=mysql
      - REDIS_URL=redis://redis:6379/0
      - MILVUS_HOST=milvus
    depends_on:
      - mysql
      - redis
      - milvus
    networks:
      - bidding-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    networks:
      - bidding-net
    depends_on:
      - backend

  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: bidding_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - bidding-net

  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - bidding-net

  # For Milvus, it is recommended to use their official compose or standalone installation.
  # This is a simplified standalone milvus definition.
  milvus:
    image: docker.m.daocloud.io/milvusdb/milvus:v2.4.10
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    networks:
      - bidding-net
    depends_on:
      - etcd
      - minio

  etcd:
    image: docker.m.daocloud.io/bitnami/etcd:3.5.5
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
    volumes:
      - etcd-data:/bitnami/etcd
    networks:
      - bidding-net

  minio:
    image: docker.m.daocloud.io/minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data
    volumes:
      - minio-data:/minio_data
    networks:
      - bidding-net

volumes:
  mysql-data:
  redis-data:
  etcd-data:
  minio-data:

networks:
  bidding-net:
    driver: bridge
