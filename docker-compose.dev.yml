services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PYTHON_IMAGE: python:3.11-slim
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      # Map .venv to an anonymous volume to bypass Windows NTFS symlink restrictions
      - backend-venv:/app/.venv
      # 外部真实数据挂载目录，可通过设置环境变量 EXTERNAL_DATA_DIR 来修改路径 
      - ${EXTERNAL_DATA_DIR:-./data}:/data
    environment:
      - MYSQL_HOST=mysql
      - REDIS_URL=redis://redis:6379/0
      - MILVUS_HOST=milvus
      - UV_LINK_MODE=copy
      - UV_EXTRA_INDEX_URL=https://download.pytorch.org/whl/cpu
      - UV_PYTHON=3.11
      - UV_SYSTEM_PYTHON=1
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-exclude", "*.db", "--reload-exclude", "*.db-journal", "--reload-exclude", "*.sqlite3"]
    depends_on:
      - mysql
      - redis
      - milvus
    networks:
      - bidding-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        NODE_IMAGE: node:22-alpine
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Map node_modules to a volume to prevent overriding by local node_modules
      - frontend-node-modules:/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    networks:
      - bidding-net
    depends_on:
      - backend

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: bidding_db
      MYSQL_USER: user
      MYSQL_PASSWORD: user123
    ports:
      - "13306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - bidding-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - bidding-net

  milvus:
    image: milvusdb/milvus:v2.4.10
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    networks:
      - bidding-net
    depends_on:
      - etcd
      - minio

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd-data:/etcd
    networks:
      - bidding-net

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data
    volumes:
      - minio-data:/minio_data
    networks:
      - bidding-net

volumes:
  mysql-data:
  redis-data:
  etcd-data:
  minio-data:
  frontend-node-modules:
  backend-venv:

networks:
  bidding-net:
    driver: bridge
